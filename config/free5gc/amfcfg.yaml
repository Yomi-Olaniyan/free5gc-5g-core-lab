info:
  version: 1.0.9
  description: AMF initial local configuration

configuration:
  amfName: AMF # the name of this AMF
  ngapIpList:  # the IP list of N2 interfaces on this AMF
    - 127.0.0.18
  ngapPort: 38412 # the SCTP port listened by NGAP

  # Service-based Interface (SBI) Configuration
  sbi:
    scheme: http # the protocol for sbi (http or https)
    registerIPv4: 127.0.0.18 # IP used to register to NRF
    bindingIPv4: 127.0.0.18  # IP used to bind the service
    port: 8000 # port used to bind the service
    tls: # the local path of TLS key
      pem: cert/amf.pem      # AMF TLS Certificate
      key: cert/amf.key      # AMF TLS Private key
    ausfUri: http://127.0.0.1:8000

  # SBI Services offered by this AMF, as per TS 29.518
  serviceNameList:
    - namf-comm # Namf_Communication service
    - namf-evts # Namf_EventExposure service
    - namf-mt   # Namf_MT service
    - namf-loc  # Namf_Location service
    - namf-oam  # OAM service

  # Guami (Globally Unique AMF ID) list supported by this AMF
  servedGuamiList:
    - plmnId: # Public Land Mobile Network ID, <PLMN ID> = <MCC><MNC>
        mcc: 208
        mnc: 93
      amfId: cafe00 # AMF identifier (3 bytes hex string, range: 000000~FFFFFF)

  # the TAI (Tracking Area Identifier) list supported by this AMF
  supportTaiList:
    - plmnId:
        mcc: 208
        mnc: 93
      tac: 000001 # Tracking Area Code (3 bytes hex string, range: 000000~FFFFFF)

  # the PLMNs (Public land mobile network) list supported by this AMF
  plmnSupportList:
    - plmnId:
        mcc: 208
        mnc: 93
      snssaiList:
        - sst: 1
          sd: 010203
        - sst: 1
          sd: 112233

  # the DNN (Data Network Name) list supported by this AMF
  supportDnnList:
    - internet

  nrfUri: http://127.0.0.10:8000 # a valid URI of NRF
  nrfCertPem: cert/nrf.pem # NRF Certificate

  # NAS Security Configuration
  security:
    integrityOrder:
      - NIA2
    cipheringOrder:
      - NEA0
      - NEA2

  # Network Name Information
  networkName:
    full: free5GC
    short: free

  # Optional NGAP Information Elements (IE)
  ngapIE:
    mobilityRestrictionList:
      enable: true
    maskedIMEISV:
      enable: true
    redirectionVoiceFallback:
      enable: false

  # Optional NAS Information Elements (IE)
  nasIE:
    networkFeatureSupport5GS:
      enable: true
      length: 1
      imsVoPS: 0
      emc: 0
      emf: 0
      iwkN26: 0
      mpsi: 0
      emcN3: 0
      mcsi: 0

  t3502Value: 720
  t3512Value: 3600
  non3gppDeregTimerValue: 3240

  t3513:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3522:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3550:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3555:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3560:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3565:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4
  t3570:
    enable: true
    expireTime: 6s
    maxRetryTimes: 4

  locality: area1

  sctp:
    numOstreams: 3
    maxInstreams: 5
    maxAttempts: 2
    maxInitTimeout: 2

  defaultUECtxReq: false

logger:
  enable: true
  level: info
  reportCaller: false
